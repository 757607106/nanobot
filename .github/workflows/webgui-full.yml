name: Web GUI Full

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install backend dependencies
        run: pip install -e '.[dev]'

      - name: Install frontend dependencies
        working-directory: web-ui
        run: npm ci

      - name: Install Playwright browser
        working-directory: web-ui
        run: npx playwright install --with-deps chromium

      - name: Run backend GUI tests
        run: python -m pytest tests/test_web_api.py tests/test_web_services.py -q

      - name: Run frontend typecheck
        working-directory: web-ui
        run: npm run typecheck

      - name: Run frontend smoke suite
        working-directory: web-ui
        run: npm run test:smoke

      - name: Build frontend bundle
        working-directory: web-ui
        run: npm run build

      - name: Run critical browser suite
        working-directory: web-ui
        run: npm run test:e2e:critical

      - name: Run accessibility browser suite
        working-directory: web-ui
        run: npm run test:e2e:a11y

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webgui-full-artifacts
          path: |
            web-ui/test-results
            web-ui/playwright-report
          if-no-files-found: ignore

